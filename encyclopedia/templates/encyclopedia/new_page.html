{% extends "encyclopedia/layout.html" %}

{% block title %}
Create New Page
{% endblock %}

{% block body %}

<h1>Create New Page</h1>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="title" placeholder="Title">

    <br><br>

    <textarea name="content" rows="15" cols="80"></textarea>

    <br><br>

    <input type="submit" value="Save">
</form>

{% endblock %}
